name: KS2LearningEngine
options:
  bundleIdPrefix: com.ks2learning
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  
settings:
  SWIFT_VERSION: "5.9"
  PRODUCT_NAME: "KS2 Learning"
  MARKETING_VERSION: "1.4.0"
  CURRENT_PROJECT_VERSION: "1"
  
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 10.0.0

targets:
  KS2LearningEngine:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    
    sources:
      - KS2LearningEngine
    
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAnalytics
    
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ks2learning.KS2LearningEngine
      INFOPLIST_FILE: KS2LearningEngine/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "5.9"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": "-"
    
    info:
      path: KS2LearningEngine/Info.plist
      properties:
        CFBundleDisplayName: "KS2 Learning"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "We need camera access for profile pictures"
        NSPhotoLibraryUsageDescription: "We need photo library access for profile pictures"
